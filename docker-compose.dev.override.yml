services:
  aury-app:
    container_name: aury-dev
    build:
      dockerfile: Dockerfile.dev
      # Remove production build args for development
      args: {}

    # Load development environment variables
    env_file:
      - .env.development

    # Override production restart policy for development
    restart: always

    # Override port mapping to match production
    ports:
      - "3001:3000"

    # Enable hot reload with volume mounts
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./types:/app/types
      - ./firebase:/app/firebase
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - ./components.json:/app/components.json
      - ./eslint.config.mjs:/app/eslint.config.mjs

    networks:
      - aury_network

    # Environment variables for development
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1

    # Remove health check for development
    healthcheck:
      disable: true
